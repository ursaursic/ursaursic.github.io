<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Academic Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        line-height: 1.6;
    }

    /* NAVBAR */
    .navbar {
        position: sticky;
        top: 0;
        background: #222;
        padding: 10px 0;
        z-index: 1000;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 0;
    }

    .navbar li {
        margin: 0 20px;
    }

    .navbar a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: color 0.3s;
    }

    .navbar a:hover {
        color: #00bcd4;
    }

    /* SECTIONS */
    section {
        padding: 80px 20px;
        max-width: 800px;
        margin: auto;
    }

    #home { background: #f4f4f4; }
    #cv { background: #ffffff; }
    #publications { background: #f4f4f4; }
    #other { background: #ffffff; }

    h1 {
        text-align: center;
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#cv">CV</a></li>
        <li><a href="#publications">Publications</a></li>
        <li><a href="#other">More</a></li>
    </ul>
</div>

<!-- SECTIONS -->
<section id="home">
    <h1>Home</h1>
    <p>Welcome to my website! This is the home section.</p>
    <p>More coming soon.</p>
</section>

<section id="cv">
    <h1>CV</h1>
    <p>Coming soon.</p>
</section>

<section id="publications">
    <h1>Publications</h1>
    <p>Coming soon.</p>
</section>

<section id="other">
    <h1>Other</h1>
    <p>Coming soon.</p>
</section>

</body>
</html>
